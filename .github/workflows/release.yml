name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build release package
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build release assets
        run: ./scripts/release.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-preview-release
          path: |
            release/MarkdownPreview-*.pkg
            release/MarkdownPreview-*.pkg.sha256
            release/MarkdownPreview-*-release-notes.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' MarkdownPreviewApp/Info.plist)
          gh release create "${GITHUB_REF_NAME}" \
            "release/MarkdownPreview-${VERSION}.pkg" \
            "release/MarkdownPreview-${VERSION}.pkg.sha256" \
            --title "Markdown Preview ${VERSION}" \
            --notes-file "release/MarkdownPreview-${VERSION}-release-notes.md"
